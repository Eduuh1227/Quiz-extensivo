<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz - Segurança de Dados</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <div class="quiz-box">
      <h1>Quiz de Segurança de Dados</h1>
      <p class="subtitle">Teste seus conhecimentos sobre proteção de informações.</p>

      <div class="top-info">
        <div class="progress-container">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div class="status-info">
          <span id="question-counter">Pergunta 1/10</span>
          <span id="timer">Tempo: 30s</span>
        </div>
      </div>

      <div id="quiz-container">
        <h2 id="question">Pergunta aqui</h2>
        <div id="answers" class="answers"></div>
        <button id="next-btn">Próxima</button>
      </div>

      <div id="result-container" class="hidden">
        <h2>Resultado Final</h2>
        <p id="score"></p>
        <p id="message"></p>
        <button id="restart-btn">Recomeçar</button>
      </div>
    </div>
  </div>

  <audio id="sound-correct" src="sounds/certo.mp3"></audio>
  <audio id="sound-wrong" src="sounds/erro.mp3"></audio>
  <audio id="sound-warning" src="sounds/warning.mp3"></audio>

  <script src="script.js"></script>
</body>

</html>
